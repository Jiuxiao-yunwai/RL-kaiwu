[env_conf]
# 起点编号 (评估固定为2)
start = 2

# 终点编号 (评估固定为1)
end = 1

# 训练时使用随机宝箱增加泛化性
# 课程学习会动态覆盖treasure_count
treasure_random = true

# 基础宝箱数量 (会被课程学习动态覆盖)
treasure_count = 13

# 固定宝箱编号 (仅treasure_random=false时生效)
treasure_id = []

# 英雄技能: 超级闪现
talent_type = 1

# 最大步数 (会被课程学习动态覆盖)
# 课程学习: 600 → 800 → 900 → 1000
max_step = 1000
